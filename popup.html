<html>
  <body>
    <script src="popup.js"></script>

    <div class="settings-panel">
      <div class="title-container">
        <h2 class="settings-title">StockExt Settings</h2>
        <label class="switch">
          <input type="checkbox" id="analysisToggle" />
          <span class="slider round"></span>
        </label>
      </div>

      <div class="settings-list">
        <div class="setting">
          <label class="setting-label" for="maxDepth">Max Depth</label>
          <input id="maxDepth" type="number" min="1" />
        </div>
        <div class="setting">
          <label class="setting-label" for="maxLines">Max Lines</label>
          <input id="maxLines" type="number" min="1" max="5" />
        </div>
      </div>

      <div class="action-container">
        <button id="resetButton" class="btn btn-reset">Reset</button>
        <button id="applyButton" class="btn btn-apply">Apply</button>
      </div>
    </div>

    <style>
      .settings-panel {
        width: 260px;
        font-family: Arial, sans-serif;
        padding: 0.5rem;
      }

      .title-container {
        display: flex;
        border-bottom: 1px solid #e6e6e6;
        margin: 0 0 12px 0;
        padding-bottom: 8px;
        justify-content: space-between;
      }
      .settings-title {
        font-size: 16px;
        font-weight: 600;
        margin: 0;
        color: #1f1f1f;
        letter-spacing: 0.2px;
      }

      .settings-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .setting {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .setting-label {
        font-size: 14px;
      }

      .setting input {
        width: 80px;
        padding: 4px;
      }

      .action-container {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
      }

      .btn {
        padding: 6px 12px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.15s ease;
        font-family: Arial, sans-serif;
        flex-grow: 1;
      }

      /* Reset button (neutral/secondary) */
      .btn-reset {
        background: #f3f3f3;
        border-color: #d0d0d0;
        color: #333;
      }

      .btn-reset:hover {
        background: #e9e9e9;
      }

      /* Apply button (primary action) */
      .btn-apply {
        background: #1a73e8;
        color: white;
      }

      .btn-apply:hover {
        background: #1669d6;
      }

      /* The switch - the box around the slider */
      .switch {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 18px;
      }

      /* Hide default HTML checkbox */
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      /* The slider */
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        -webkit-transition: 0.4s;
        transition: 0.4s;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 12px;
        width: 12px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        -webkit-transition: 0.4s;
        transition: 0.4s;
      }

      input:checked + .slider {
        background-color: #2196f3;
      }

      input:focus + .slider {
        box-shadow: 0 0 1px #2196f3;
      }

      input:checked + .slider:before {
        -webkit-transform: translateX(18px);
        -ms-transform: translateX(18px);
        transform: translateX(18px);
      }

      /* Rounded sliders */
      .slider.round {
        border-radius: 34px;
      }

      .slider.round:before {
        border-radius: 50%;
      }
    </style>
  </body>
</html>
